<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CodeLens Agent</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #0B0F19;
        color: #F3F4F6;
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding-bottom: 12px;
      }
      .logo {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        background: linear-gradient(135deg, #6366F1, #4F46E5);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 14px;
        color: #fff;
      }
      .title {
        font-size: 15px;
        font-weight: bold;
        color: #fff;
        margin: 0;
      }
      .subtitle {
        font-size: 10px;
        color: #9CA3AF;
        margin: 0;
      }
      .card {
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        padding: 10px;
      }
      .label {
        font-size: 9px;
        text-transform: uppercase;
        color: #6B7280;
        font-weight: bold;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
        display: block;
      }
      .status-badge {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
      }
      .status-tracking {
        background-color: rgba(16, 185, 129, 0.1);
        color: #10B981;
      }
      .status-idle {
        background-color: rgba(255, 255, 255, 0.05);
        color: #9CA3AF;
      }
      .input-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      input, select {
        background-color: #030712;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        color: #F3F4F6;
        padding: 6px 10px;
        font-size: 12px;
        outline: none;
      }
      input:focus, select:focus {
        border-color: #6366F1;
      }
      button {
        background-color: #6366F1;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #4F46E5;
      }
      button.secondary {
        background-color: rgba(255, 255, 255, 0.05);
        color: #E5E7EB;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      button.secondary:hover {
        background-color: rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">CL</div>
        <div>
          <h1 class="title">CodeLens Agent</h1>
          <p class="subtitle">Understand how you code</p>
        </div>
      </div>

      <!-- Live Tracking Info -->
      <div class="card">
        <span class="label">Live Status</span>
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;">
          <span id="tracking-status" class="status-badge status-idle">Idle</span>
          <span id="tracking-timer" style="font-family: monospace; font-size: 12px; color: #D1D5DB;">00:00</span>
        </div>
        <div id="problem-info" style="display: none;">
          <div style="font-size: 12px; font-weight: bold; color: #fff;" id="problem-name">Waiting...</div>
          <div style="font-size: 10px; color: #9CA3AF; margin-top: 2px;">
            Runs: <span id="problem-runs" style="color: #fff;">0</span> | Lang: <span id="problem-lang" style="color: #fff;">C++</span>
          </div>
        </div>
      </div>

      <!-- Configurations -->
      <div class="input-group">
        <label class="label">User Email ID</label>
        <input type="email" id="user-email" value="test@codelens.dev">
      </div>
      <div class="input-group">
        <label class="label">API Server URL</label>
        <input type="url" id="api-url" value="http://localhost:3000">
      </div>

      <!-- Demo Simulator Trigger -->
      <div class="card" style="border-color: rgba(99, 102, 241, 0.2); background-color: rgba(99, 102, 241, 0.02);">
        <span class="label" style="color: #818CF8;">Hackathon Session Simulator</span>
        <div class="input-group" style="margin-bottom: 8px;">
          <select id="sim-profile">
            <option value="dp">Unsolved DP (Struggling with boundary checks)</option>
            <option value="graph">Optimal Graph BFS (Solved course topological check)</option>
            <option value="stack">Valid Parentheses (Solved quickly)</option>
          </select>
        </div>
        <button id="btn-simulate" style="width: 100%;">Inject Simulation Logs</button>
      </div>

      <div style="text-align: center; font-size: 9px; color: #4B5563;">
        CodeLens Extension v1.0.0
      </div>
    </div>
    <script type="module" src="./src/popup.ts"></script>
  </body>
</html>
